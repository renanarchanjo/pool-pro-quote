<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

    <!-- PWA & Native App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SIMULAPOOL" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0EA5E9" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />

    <!-- Apple splash screens (iPhone) -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

    <!-- OneSignal -->
    <link rel="dns-prefetch" href="https://cdn.onesignal.com">
    <link rel="preconnect" href="https://api.onesignal.com" crossorigin>

    <!-- Manifest (vite-plugin-pwa generates this, fallback to static) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- SEO -->
    <title>SIMULAPOOL - O jeito moderno de orçar piscinas</title>
    <meta name="description" content="Sistema profissional de orçamentos automatizados para piscinas de fibra. Simule, orce e feche negócios mais rápido." />
    <meta name="author" content="SIMULAPOOL" />
    <meta property="og:title" content="SIMULAPOOL - Orçamentos Automatizados para Piscinas" />
    <meta property="og:description" content="O jeito moderno de orçar piscinas. Sistema profissional para lojistas." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SIMULAPOOL" />

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "5f4c1578-23d5-49ff-b055-49a63c4c3074",
        });
      });
    </script>

    <style>
      /* Prevent flash of unstyled content & ensure fullscreen app */
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        html, body, #root { background: #141519; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
